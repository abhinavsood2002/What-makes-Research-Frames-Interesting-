version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: research_postgres
    environment:
      POSTGRES_DB: research_frames
      POSTGRES_USER: research_user
      POSTGRES_PASSWORD: research_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: on-failure
    
    # Signal and shutdown configuration
    stop_signal: SIGINT          # PostgreSQL prefers SIGINT for graceful shutdown
    stop_grace_period: 30s       # Give PostgreSQL 30 seconds to shut down gracefully
    init: true                   # Use Docker's init process to handle signals properly
    
    # Health check to monitor container state
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U research_user -d research_frames"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Optional: Resource limits to prevent runaway processes
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  postgres_data: